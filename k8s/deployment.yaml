apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app1-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app1
  template:
    metadata:
      labels:
        app: my-app1
    spec:
      containers:
      - name: my-app1
        image: my-app1:latest  # your Docker image
        imagePullPolicy: Never
        ports:
        - containerPort: 3001